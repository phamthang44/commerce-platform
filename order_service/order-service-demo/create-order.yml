info:
  name: create order
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8081/v1/orders
  body:
    type: json
    data: |-
      {
        "customerId": "PASTE-CUSTOMER-UUID-HERE",
        "items": [
          {
            "productId": "PASTE-PRODUCT-UUID-FROM-PRODUCT-SERVICE",
            "productName": "Thiết bị",
            "unitPrice": "1000.00",
            "quantity": 2
          },
          {
            "productId": "PASTE-ANOTHER-PRODUCT-UUID",
            "productName": "Phụ kiện",
            "unitPrice": "250.00",
            "quantity": 1
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
