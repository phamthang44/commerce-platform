services:

  # ─────────────────────────────────────────────
  # PostgreSQL — one instance, two isolated databases
  #   product_db  → owned by product_service
  #   order_db    → owned by order_service
  #
  # Why two databases, not two schemas?
  #   MySQL: "schema" = database (real isolation)
  #   PostgreSQL: "schema" = logical namespace inside a database (NOT isolation)
  #   For true microservice isolation in PostgreSQL → use separate databases.
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # ─────────────────────────────────────────────
  # product-service
  # Uncomment after adding a Dockerfile inside product_service/
  # ─────────────────────────────────────────────
  # product-service:
  #   build: ./product_service
  #   container_name: product-service
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product_db
  #     SPRING_DATASOURCE_USERNAME: postgres
  #     SPRING_DATASOURCE_PASSWORD: postgres
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - ecommerce-network

  # ─────────────────────────────────────────────
  # order-service (future)
  # ─────────────────────────────────────────────
  # order-service:
  #   build: ./order_service
  #   container_name: order-service
  #   ports:
  #     - "8081:8080"
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
  #     SPRING_DATASOURCE_USERNAME: postgres
  #     SPRING_DATASOURCE_PASSWORD: postgres
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - ecommerce-network

  # ─────────────────────────────────────────────
  # Zookeeper — required by Confluent Kafka
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: ecommerce-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ecommerce-network

  # ─────────────────────────────────────────────
  # Kafka — Confluent image
  # Accessible inside Docker network at: kafka:9092
  # Accessible from your host machine at: localhost:29092
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: ecommerce-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - ecommerce-network

  # ─────────────────────────────────────────────
  # Kafka UI — visual dashboard
  # Open http://localhost:8989 in your browser
  # ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ecommerce-kafka-ui
    ports:
      - "8989:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - ecommerce-network

volumes:
  postgres_data:

networks:
  ecommerce-network:
    driver: bridge
