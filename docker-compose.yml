services:

  # ─────────────────────────────────────────────
  # PostgreSQL — one instance, two isolated databases
  #   product_db  → owned by product_service
  #   order_db    → owned by order_service
  #
  # Why two databases, not two schemas?
  #   MySQL: "schema" = database (real isolation)
  #   PostgreSQL: "schema" = logical namespace inside a database (NOT isolation)
  #   For true microservice isolation in PostgreSQL → use separate databases.
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # ─────────────────────────────────────────────
  # product-service
  # Uncomment after adding a Dockerfile inside product_service/
  # ─────────────────────────────────────────────
  # product-service:
  #   build: ./product_service
  #   container_name: product-service
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product_db
  #     SPRING_DATASOURCE_USERNAME: postgres
  #     SPRING_DATASOURCE_PASSWORD: postgres
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - ecommerce-network

  # ─────────────────────────────────────────────
  # order-service (future)
  # ─────────────────────────────────────────────
  # order-service:
  #   build: ./order_service
  #   container_name: order-service
  #   ports:
  #     - "8081:8080"
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
  #     SPRING_DATASOURCE_USERNAME: postgres
  #     SPRING_DATASOURCE_PASSWORD: postgres
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - ecommerce-network

volumes:
  postgres_data:

networks:
  ecommerce-network:
    driver: bridge
