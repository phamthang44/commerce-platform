info:
  name: create product
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/v1/products
  body:
    type: json
    data: |-
      {
        "name" : "Thiết bị",
        "description": "Mô tả",
        "price" : "1000.00",
        "stockQuantity" : "1",
        "status": "ACTIVE",
        "categoryId": "1"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
